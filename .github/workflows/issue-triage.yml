name: "Agentic: Issue Triage"

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    name: AI Issue Triage
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Issue Triage Agent
        uses: github/agentic-workflows@v1
        with:
          agent-source: .github/agents/issue-triage.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ai-engine: copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
