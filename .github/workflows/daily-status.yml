name: "Agentic: Daily Status Report"

on:
  schedule:
    - cron: "0 9 * * *"  # Every day at 9:00 AM UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  issues: write
  contents: read
  pull-requests: read

jobs:
  daily-report:
    name: AI Daily Status
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Daily Status Agent
        uses: github/agentic-workflows@v1
        with:
          agent-source: .github/agents/daily-status.md
          github-token: ${{ secrets.GITHUB_TOKEN }}
          ai-engine: copilot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
