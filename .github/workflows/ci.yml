# ─────────────────────────────────────────────────────────
# Standard CI workflow for the Python app
# This runs alongside the agentic workflows to show the
# difference: this is DETERMINISTIC, the agents are INTELLIGENT
# ─────────────────────────────────────────────────────────
name: "CI: Test & Lint"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd app
          pip install -r requirements.txt

      - name: Run tests
        run: |
          cd app
          python test_app.py
